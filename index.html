<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Public+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>
 
    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="fetchBtn">Get Space Images</button>
    </div>
 
    <div id="status"></div>
 
    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>
 
  <!-- Modal -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-label="Photo detail">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-body">
        <div class="modal-image-wrap">
          <img id="modalImg" src="" alt="" />
        </div>
        <div class="modal-info">
          <p class="modal-date" id="modalDate"></p>
          <h2 class="modal-title" id="modalTitle"></h2>
          <p class="modal-explanation" id="modalExplanation"></p>
          <p class="modal-copyright" id="modalCopyright"></p>
        </div>
      </div>
    </div>
  </div>
 
  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
